<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .hero-img{
            width:350px;
            height:220px;
            object-fit:cover;
        }

        .card-img-top{
            width:100%;
            height:300px;
            object-fit:cover;
        }

        .card{
            margin-bottom:20px;
        }
    </style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">FoodExpress</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Offers</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<div class="container text-center mt-5">

    <h1>Delicious Food Delivered Fast</h1>

    <p>Order your favorite meals anytime, anywhere.</p>

    <img src="C:\Users\aksha\Desktop\MERN\FOOD.webp"
         class="hero-img rounded"
         alt="Food Image">

    <br><br>

    <button class="btn btn-success">Order Now</button>

</div>

<!-- Popular Dishes -->
<div class="container mt-5">

    <h2 class="text-center mb-4">Popular Dishes</h2>

    <div class="row">

        <!-- Pizza -->
        <div class="col-md-4">
            <div class="card">
                <img src="C:\Users\aksha\Desktop\MERN\P.webp" class="card-img-top" alt="Pizza">
                <div class="card-body">
                    <h5 class="card-title">Pizza</h5>
                    <p>Cheesy and delicious.</p>
                    <button class="btn btn-primary">Buy</button>
                </div>
            </div>
        </div>

        <!-- Burger -->
        <div class="col-md-4">
            <div class="card">
                <img src="C:\Users\aksha\Desktop\MERN\b.webp" class="card-img-top" alt="Burger">
                <div class="card-body">
                    <h5 class="card-title">Burger</h5>
                    <p>Fresh and juicy burger.</p>
                    <button class="btn btn-primary">Buy</button>
                </div>
            </div>
        </div>

        <!-- Pasta -->
        <div class="col-md-4">
            <div class="card">
                <img src="C:\Users\aksha\Desktop\MERN\pas.webp" class="card-img-top" alt="Pasta">
                <div class="card-body">
                    <h5 class="card-title">Pasta</h5>
                    <p>Creamy Italian pasta.</p>
                    <button class="btn btn-primary">Buy</button>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 FoodExpress | Fast & Fresh Delivery
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
